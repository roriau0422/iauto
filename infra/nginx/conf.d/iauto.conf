# nginx config for the prod stack. ACME challenges + HTTPS reverse
# proxy to the api service. Certificate provisioning is out of scope
# here — use certbot or acme.sh against the iauto_certs volume on the
# host.

upstream iauto_api {
    server api:8000;
}

# HTTP -> HTTPS redirect, except for ACME challenges.
server {
    listen 80;
    server_name _;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name _;

    # Replace these with the real cert paths once certbot has run.
    ssl_certificate /etc/letsencrypt/live/iauto/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/iauto/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 25 MB request body — leaves headroom for image uploads via
    # /v1/media/* presign+confirm flow even though the body itself goes
    # straight to MinIO. Also covers the /v1/ai-mechanic/voice flow.
    client_max_body_size 25m;

    # Don't expose /metrics outside the cluster — Prometheus runs
    # alongside the app and scrapes the upstream directly.
    location = /metrics {
        deny all;
        return 403;
    }

    location / {
        proxy_pass http://iauto_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
    }
}
