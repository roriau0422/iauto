# iAuto — local development stack.
# Postgres 16 with pgvector, Redis 7, MinIO. All bound to non-default host ports
# to avoid colliding with anything else running on the developer's machine.
#
# Bring it up:
#     docker compose -f infra/docker-compose.dev.yml up -d
# Tear it down (keeping volumes):
#     docker compose -f infra/docker-compose.dev.yml down
# Nuke volumes too:
#     docker compose -f infra/docker-compose.dev.yml down -v

name: iauto-dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: iauto-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: iauto
      POSTGRES_PASSWORD: iauto_dev
      POSTGRES_DB: iauto
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "15432:5432"
    volumes:
      - iauto_pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iauto -d iauto"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: iauto-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "16379:6379"
    volumes:
      - iauto_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: iauto-minio
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: iauto
      MINIO_ROOT_PASSWORD: iauto_dev_minio
    ports:
      - "19000:9000"   # S3 API
      - "19001:9001"   # Console
    volumes:
      - iauto_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # One-shot bucket bootstrap. Uses mc to idempotently create the media bucket.
  minio-bootstrap:
    image: minio/mc:latest
    container_name: iauto-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 iauto iauto_dev_minio &&
      mc mb --ignore-existing local/iauto-media &&
      mc anonymous set download local/iauto-media &&
      echo 'minio bucket ready'
      "
    restart: "no"

volumes:
  iauto_pg_data:
  iauto_redis_data:
  iauto_minio_data:
